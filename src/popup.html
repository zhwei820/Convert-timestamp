<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <title>时间戳转换</title>
    <style>
      body {
        width: 400px;
        padding: 20px;
        font-family: Arial, sans-serif;
      }
      .container {
        display: flex;
        flex-direction: column;
        gap: 15px;
      }
      .input-group {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .input-group label {
        font-size: 14px;
        color: #333;
      }
      .input-group input {
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 14px;
        width: 100%;
        box-sizing: border-box;
      }
      .input-group input:focus {
        outline: none;
        border-color: #4a90e2;
      }
      .button-group {
        display: flex;
        gap: 10px;
        margin-top: 10px;
      }
      button {
        padding: 8px 15px;
        border: none;
        border-radius: 4px;
        background-color: #4a90e2;
        color: white;
        cursor: pointer;
        font-size: 14px;
      }
      button:hover {
        background-color: #357abd;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="input-group">
        <label>时间戳 / 格式化时间:</label>
        <input type="text" id="input" placeholder="输入时间戳或格式化时间..." />
      </div>
      <div class="input-group">
        <label>转换结果:</label>
        <input type="text" id="output" readonly />
      </div>
      <div class="button-group">
        <button id="nowButton">当前时间</button>
        <span
          id="timestampUnit"
          style="font-size: 24px; color: #3711de; margin-left: 8px"
        ></span>
      </div>
    </div>
    <script src="utils.js"></script>
    <script src="scripts.js"></script>
  </body>
</html>
